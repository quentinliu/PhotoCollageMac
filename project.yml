name: PhotoCollageMac
options:
  bundleIdPrefix: com.photocollage
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: ""

targets:
  PhotoCollageMac:
    type: application
    platform: macOS
    sources:
      - path: PhotoCollageMac/Sources
        type: group
      - path: Resources
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.photocollage.mac
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_NAME: PhotoCollageMac
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: Resources/PhotoCollageMac.entitlements
    entitlements:
      path: Resources/PhotoCollageMac.entitlements
